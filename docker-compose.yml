services:
  mongo:
    image: mongo:latest
    container_name: decisionvault-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    container_name: decisionvault-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/decisionvault
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET before running docker compose}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-http://localhost}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - NODE_ENV=production
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: decisionvault-client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo-data:
